name: Release

# Triggers when a vX.Y.Z tag is pushed (typically by scripts/release.sh
# --push). Extracts the matching CHANGELOG section and creates a GitHub
# Release with that as the body. The release is plain text (no
# attached binaries) — users build from source via `go install
# github.com/dgr237/tflens@vX.Y.Z`.
#
# Decoupled from CI: CI must already be green on the tag's commit
# (which it will be, since the commit was on main before the tag
# was applied).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need history for previous-tag lookup

      - name: Extract CHANGELOG section for ${{ github.ref_name }}
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "error: CHANGELOG.md missing" >&2
            exit 1
          fi
          # Pull the body of the matching `## [X.Y.Z] — DATE` section.
          # Stops at the next `## [` heading or the comparison-link
          # footer, whichever comes first.
          body="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\] — " { in_section=1; next }
            in_section && /^## \[/ { in_section=0 }
            in_section && /^\[.*\]: / { in_section=0 }
            in_section { print }
          ' CHANGELOG.md | sed -e '/./,$!d' -e ':a;/^\n*$/{$d;N;ba;}')"
          if [ -z "$body" ]; then
            echo "error: no CHANGELOG entry for v${version}" >&2
            exit 1
          fi
          {
            echo "body<<__END__"
            echo "$body"
            echo "__END__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.notes.outputs.body }}" \
            --verify-tag
