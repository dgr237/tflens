name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read


jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure git identity
        # Integration tests invoke `git commit` in temp repos.
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Release-anchor test
        # Verifies that scripts/release.sh's sentinel-marker mechanism
        # produces either a correct auto-merge or an explicit conflict
        # when a PR's CHANGELOG entries are merged across a release
        # boundary — the failure mode that caused silent mis-attribution
        # on v0.17→v0.18 and v0.18→v0.19.
        shell: bash
        run: bash scripts/test-release-anchor.sh
