name: Setup labels

# One-shot workflow that creates (or updates) the labels the release
# + changelog workflows rely on:
#
#   - release:patch / release:minor / release:major — drive auto-release
#     on PR merge (.github/workflows/auto-release.yml)
#   - no-changelog — opt a PR out of the CHANGELOG.md check
#     (.github/workflows/changelog-check.yml)
#
# Run via the Actions tab → "Setup labels" → "Run workflow".
# Idempotent — uses `gh label create --force`, so re-running just
# refreshes colour/description without erroring on already-present
# labels.

on:
  workflow_dispatch:

permissions:
  issues: write   # `gh label` operates under the issues permission

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Release labels — traffic-light colours: green = safe,
          # yellow = additive, red = breaking.
          gh label create "release:patch" \
            --color "0e8a16" \
            --description "Bug fixes / small adjustments — auto-bumps the patch version on merge." \
            --force

          gh label create "release:minor" \
            --color "fbca04" \
            --description "Backwards-compatible additions — auto-bumps the minor version on merge." \
            --force

          gh label create "release:major" \
            --color "d73a4a" \
            --description "Breaking changes — auto-bumps the major version on merge." \
            --force

          # CHANGELOG opt-out — neutral grey, not red, since it's a
          # legitimate escape hatch for refactors / dep bumps rather
          # than a red flag.
          gh label create "no-changelog" \
            --color "cccccc" \
            --description "Opt this PR out of the CHANGELOG.md check (refactors, internal cleanup, non-user-visible changes)." \
            --force

          echo "Labels ready:"
          gh label list --search "release:"
          gh label list --search "no-changelog"
